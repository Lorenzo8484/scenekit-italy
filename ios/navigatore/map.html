<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#map{width:100%;height:100%;background:#111;overflow:hidden;font-family:-apple-system,Helvetica Neue,sans-serif}
#searchBar{position:absolute;top:60px;left:16px;right:16px;z-index:10;display:flex;gap:8px}
#searchInput{flex:1;height:44px;border-radius:12px;border:none;padding:0 16px;font-size:16px;background:rgba(30,30,40,0.92);color:#fff;backdrop-filter:blur(10px)}
#searchInput::placeholder{color:#888}
#searchBtn{width:44px;height:44px;border-radius:12px;border:none;background:rgba(30,30,40,0.92);color:#fff;font-size:20px;cursor:pointer}
#searchResults{position:absolute;top:112px;left:16px;right:16px;z-index:10;background:rgba(30,30,40,0.95);border-radius:12px;max-height:300px;overflow-y:auto;display:none;backdrop-filter:blur(10px)}
#searchResults div{padding:14px 16px;color:#ccc;border-bottom:1px solid rgba(255,255,255,0.08);cursor:pointer}
#searchResults div:last-child{border:none}
#searchResults div:hover{background:rgba(255,255,255,0.1);color:#fff}
#compass{position:absolute;bottom:140px;right:16px;z-index:10;width:44px;height:44px;border-radius:22px;background:rgba(30,30,40,0.9);border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#fff;backdrop-filter:blur(10px)}
#posBtn{position:absolute;bottom:82px;right:16px;z-index:10;width:44px;height:44px;border-radius:22px;background:rgba(30,30,40,0.9);border:none;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:#4488ff;backdrop-filter:blur(10px)}
#navPanel{position:absolute;bottom:0;left:0;right:0;z-index:10;background:rgba(20,20,30,0.95);border-radius:20px 20px 0 0;padding:16px 20px;padding-bottom:40px;display:none;backdrop-filter:blur(10px)}
#navInstruction{color:#fff;font-size:18px;font-weight:600;margin-bottom:4px}
#navDistance{color:#aaa;font-size:14px;margin-bottom:8px}
#navETA{color:#888;font-size:13px}
#navEndBtn{position:absolute;top:16px;right:16px;padding:8px 16px;border-radius:20px;border:none;background:#e74c3c;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
#status{position:absolute;top:4px;left:8px;z-index:20;color:rgba(255,255,255,0.3);font-size:10px}
.maplibregl-ctrl-attrib{display:none!important}
</style>
</head>
<body>
<div id="map"></div>
<div id="status">caricamento...</div>
<div id="searchBar">
<input id="searchInput" type="text" placeholder="Cerca destinazione..." autocomplete="off"/>
<button id="searchBtn">🔍</button>
</div>
<div id="searchResults"></div>
<div id="compass" onclick="resetNorth()">🧭</div>
<div id="posBtn" onclick="centerOnMe()">📍</div>
<div id="navPanel">
<button id="navEndBtn" onclick="endNavigation()">✕</button>
<div id="navInstruction">—</div>
<div id="navDistance"></div>
<div id="navETA"></div>
</div>
<script>
// ===================================================================
// STATE
// ===================================================================
let userLat = 44.49, userLng = 11.34, userCourse = 0, userHeading = 0;
let isNavigating = false;
let navCoords = [];
let markerEl = null;
let destMarker = null;
let animFrame = null;

// ===================================================================
// MAPLIBRE — usa lo stile liberty di OpenFreeMap
// ===================================================================
const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/liberty",
  center: [11.34, 44.49],
  zoom: 14,
  pitch: 50,
  bearing: 0,
  attributionControl: false
});

map.on("style.load", () => {
  document.getElementById("status").textContent = "stile caricato";
  // Hide 3D buildings
  try {
    if (map.getLayer("building")) map.setLayoutProperty("building", "visibility", "none");
    if (map.getLayer("building_outline")) map.setLayoutProperty("building_outline", "visibility", "none");
  } catch(e) {
    console.log("No building layers to hide");
  }
  createUserMarker();
});

map.on("load", () => {
  document.getElementById("status").textContent = "mappa pronta";
  map.flyTo({center:[11.34, 44.49], zoom:15, pitch:50});
});

map.on("error", (e) => {
  document.getElementById("status").textContent = "errore: " + (e.error ? e.error.message : "?");
  console.error("Map error:", e);
});

// ===================================================================
// USER MARKER
// ===================================================================
function createUserMarker() {
  markerEl = document.createElement("div");
  markerEl.style.cssText = "width:28px;height:28px;border-radius:50%;background:#4488ff;border:3px solid #fff;box-shadow:0 2px 12px rgba(0,0,0,0.5);";
  new maplibregl.Marker({element:markerEl,anchor:"center"})
    .setLngLat([userLng, userLat])
    .addTo(map);
  document.getElementById("status").textContent = "marker creato";
}

function updatePosition(lat, lng, course) {
  userLat = lat; userLng = lng; userCourse = course;
  if (markerEl) {
    markerEl.style.transform = "rotate(" + course + "deg)";
  }
}

function updateHeading(heading) {
  userHeading = heading;
  document.getElementById("compass").style.transform = "rotate(" + (-heading) + "deg)";
}

function centerOnMe() {
  map.flyTo({center:[userLng, userLat], zoom:16, pitch:50, bearing:userCourse});
}

function resetNorth() {
  map.flyTo({bearing:0, pitch:50});
}

// ===================================================================
// SEARCH (Nominatim)
// ===================================================================
const NOMINATIM = "https://nominatim.openstreetmap.org";

document.getElementById("searchBtn").onclick = doSearch;
document.getElementById("searchInput").onkeydown = function(e) {
  if (e.key === "Enter") doSearch();
};

function doSearch() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return;
  const url = NOMINATIM + "/search?format=jsonv2&q=" + encodeURIComponent(q) + "&limit=8&addressdetails=1";
  fetch(url)
    .then(r => r.json())
    .then(results => {
      const container = document.getElementById("searchResults");
      container.innerHTML = "";
      if (results.length === 0) {
        container.innerHTML = "<div style='color:#888'>Nessun risultato</div>";
        container.style.display = "block";
        return;
      }
      results.forEach(r => {
        const div = document.createElement("div");
        div.textContent = r.display_name || r.name || "?";
        div.onclick = function() { selectResult(r); };
        container.appendChild(div);
      });
      container.style.display = "block";
    })
    .catch(e => {
      document.getElementById("status").textContent = "search error";
    });
}

function selectResult(r) {
  document.getElementById("searchResults").style.display = "none";
  document.getElementById("searchInput").value = r.display_name || r.name || "";
  const lat = parseFloat(r.lat);
  const lon = parseFloat(r.lon);
  map.flyTo({center:[lon, lat], zoom:16, pitch:50});
  if (destMarker) destMarker.remove();
  destMarker = new maplibregl.Marker({color:"#e74c3c"})
    .setLngLat([lon, lat])
    .addTo(map);
  calculateRoute(userLat, userLng, lat, lon, r.display_name || r.name);
}

map.on("click", () => { document.getElementById("searchResults").style.display = "none"; });

// ===================================================================
// ROUTING (OSRM)
// ===================================================================
const OSRM = "https://router.project-osrm.org";

function calculateRoute(fromLat, fromLng, toLat, toLng, name) {
  const url = OSRM + `/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?geometries=geojson&steps=true&overview=full&language=it`;
  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (!data.routes || data.routes.length === 0) return;
      const route = data.routes[0];
      navCoords = route.geometry.coordinates;
      // Remove old route
      try { map.removeLayer("route-line"); map.removeSource("route-line"); } catch(e) {}
      map.addLayer({
        id: "route-line",
        type: "line",
        source: {type:"geojson",data:{type:"Feature",geometry:route.geometry}},
        paint: {"line-color":"#4488ff","line-width":6,"line-opacity":0.8}
      });
      startNavigation(route, name);
    });
}

function startNavigation(route, name) {
  isNavigating = true;
  document.getElementById("navPanel").style.display = "block";
  document.getElementById("navInstruction").textContent = "Verso " + (name || "destinazione");
  document.getElementById("navDistance").textContent = formatDistance(route.distance);
  document.getElementById("navETA").textContent = formatDuration(route.duration);
  navWatch();
}

function navWatch() {
  if (animFrame) cancelAnimationFrame(animFrame);
  function tick() {
    if (!isNavigating) return;
    if (navCoords.length > 1) {
      let closest = navCoords[0];
      let minDist = Infinity;
      for (const c of navCoords) {
        const d = distance(userLat, userLng, c[1], c[0]);
        if (d < minDist) { minDist = d; closest = c; }
      }
      let idx = navCoords.findIndex(c => c[0] === closest[0] && c[1] === closest[1]);
      if (idx > 0) navCoords = navCoords.slice(idx);
      if (navCoords.length > 1) {
        document.getElementById("navDistance").textContent = formatDistance(routeLength(navCoords));
        updateInstruction(navCoords);
      }
    }
    animFrame = requestAnimationFrame(tick);
  }
  animFrame = requestAnimationFrame(tick);
}

function endNavigation() {
  isNavigating = false;
  document.getElementById("navPanel").style.display = "none";
  if (animFrame) cancelAnimationFrame(animFrame);
  try { map.removeLayer("route-line"); map.removeSource("route-line"); } catch(e) {}
  if (destMarker) { destMarker.remove(); destMarker = null; }
  navCoords = [];
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.navigationEnd)
    window.webkit.messageHandlers.navigationEnd.postMessage("");
}

function updateInstruction(coords) {
  if (coords.length < 3) return;
  const b1 = bearing(coords[0][1], coords[0][0], coords[1][1], coords[1][0]);
  const b2 = coords.length > 2 ? bearing(coords[1][1], coords[1][0], coords[2][1], coords[2][0]) : b1;
  let turn = b2 - b1;
  if (turn > 180) turn -= 360;
  if (turn < -180) turn += 360;
  let text = "Prosegui dritto";
  if (turn > 20 && turn <= 60) text = "Leggermente a destra";
  else if (turn > 60 && turn <= 120) text = "Svolta a destra";
  else if (turn > 120) text = "Inversione";
  else if (turn < -20 && turn >= -60) text = "Leggermente a sinistra";
  else if (turn < -60 && turn >= -120) text = "Svolta a sinistra";
  else if (turn < -120) text = "Inversione";
  document.getElementById("navInstruction").textContent = text;
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.speak)
    window.webkit.messageHandlers.speak.postMessage(text);
}

// ===================================================================
// HELPERS
// ===================================================================
function formatDistance(m) { return m < 1000 ? Math.round(m) + " m" : (m/1000).toFixed(1) + " km"; }
function formatDuration(s) {
  if (s < 60) return Math.round(s) + " s";
  if (s < 3600) return Math.floor(s/60) + " min";
  return Math.floor(s/3600) + " h " + Math.floor((s%3600)/60) + " min";
}
function distance(lat1,lng1,lat2,lng2) {
  const R=6371000, dL=(lat2-lat1)*Math.PI/180, dL2=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dL2/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(lat1,lng1,lat2,lng2) {
  const dL=(lng2-lng1)*Math.PI/180;
  const y=Math.sin(dL)*Math.cos(lat2*Math.PI/180);
  const x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function routeLength(c){let d=0;for(let i=1;i<c.length;i++)d+=distance(c[i-1][1],c[i-1][0],c[i][1],c[i][0]);return d;}
</script>
</body>
</html>
